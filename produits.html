<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#00bcd4"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Velero Energy"/>
<title>Produits — Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0ee;font-family:'DM Sans',sans-serif;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:480px;padding-bottom:80px;}
.topbar{background:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.07);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:700;}
.solde-pill{background:#e0f7fa;color:#00838f;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px;}
.product-card{margin:8px 14px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.08);position:relative;}
.card-header{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;}
.card-badge{font-size:22px;}
.card-name{font-size:16px;font-weight:800;font-family:'Playfair Display',serif;}
.card-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.card-body{padding:0 18px 14px;display:flex;flex-direction:column;gap:7px;}
.card-row{display:flex;justify-content:space-between;align-items:center;}
.card-label{font-size:12px;color:#999;font-weight:600;}
.card-value{font-size:14px;font-weight:700;}
.card-value.teal{color:#00bcd4;font-size:15px;}
.divider{height:1px;background:#f5f5f5;margin:3px 0;}
.btn-invest{width:calc(100% - 36px);margin:0 18px 16px;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;color:#fff;background:linear-gradient(135deg,#00bcd4,#0097a7);box-shadow:0 4px 14px rgba(0,188,212,.3);}
.btn-invest.actif{background:linear-gradient(135deg,#4caf50,#388e3c);}
.card-ribbon{position:absolute;top:14px;right:0;background:#00bcd4;color:#fff;font-size:9px;font-weight:700;padding:3px 12px 3px 8px;border-radius:4px 0 0 4px;}
.p-starter .card-header{background:linear-gradient(135deg,#e8f8f5,#d0f5ee);}
.p-starter .card-tag{background:#e0faf4;color:#00a884;}
.p-bronze .card-header{background:linear-gradient(135deg,#fdf3e3,#fce8c8);}
.p-bronze .card-tag{background:#fef0d8;color:#b8762a;}
.p-silver .card-header{background:linear-gradient(135deg,#f0f0f5,#e2e2ee);}
.p-silver .card-tag{background:#ebebf5;color:#6060a0;}
.p-gold .card-header{background:linear-gradient(135deg,#fdf8e1,#faefc0);}
.p-gold .card-tag{background:#fef8d8;color:#b89a00;}
.p-premium .card-header{background:linear-gradient(135deg,#fdecea,#fad4d0);}
.p-premium .card-tag{background:#fde8e6;color:#c0392b;}
.p-vip .card-header{background:linear-gradient(135deg,#f3e5f5,#e1bee7);}
.p-vip .card-tag{background:#f3e5f5;color:#7b1fa2;}
.p-cold .card-header{background:linear-gradient(135deg,#e3f2fd,#bbdefb);}
.p-cold .card-tag{background:#e1f5fe;color:#0277bd;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:480px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:18px;font-weight:800;font-family:'Playfair Display',serif;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#888;margin-bottom:18px;}
.mrow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.mrow:last-of-type{border-bottom:none;}
.mlabel{color:#888;}
.mval{font-weight:700;}
.mval.teal{color:#00bcd4;}
.mval.red{color:#e53935;}
.mval.green{color:#15803d;}
.modal-btns{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:13px;background:#f5f5f5;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#666;}
.btn-ok{flex:2;padding:13px;background:linear-gradient(135deg,#00bcd4,#0097a7);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;}
.btn-ok:disabled{opacity:.6;cursor:not-allowed;}
.malert{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none;}
.malert.show{display:block;}
.malert.err{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;}
.malert.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.insuff{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:12px;font-size:13px;color:#f57f17;margin-bottom:12px;display:none;}
.insuff.show{display:block;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0ebe8;display:flex;padding:8px 0 12px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#ccc;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;}
.nav-item.active{color:#00bcd4;}
.nav-item .ni{font-size:21px;}
.nav-dot{width:5px;height:5px;border-radius:50%;background:#00bcd4;margin:1px auto 0;}
</style>
</head>
<body>
<script src="/pwa-install.js"></script>
<div class="wrap">
  <div class="topbar">
    <span class="topbar-title">📦 Produits</span>
    <span class="solde-pill">💰 <span id="soldePill">...</span> FCFA</span>
  </div>
  <div id="plansList"><div class="loading">⏳ Chargement des plans...</div></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="mTitle">Confirmer l'investissement</div>
    <div class="modal-sub">Vérifiez avant de valider</div>
    <div class="malert" id="mAlert"></div>
    <div class="insuff" id="mInsuff">⚠️ Solde insuffisant — <a href="recharge.html" style="color:#00bcd4;font-weight:700;">Recharger →</a></div>
    <div class="mrow"><span class="mlabel">Plan</span><span class="mval" id="mPlan">—</span></div>
    <div class="mrow"><span class="mlabel">Coût</span><span class="mval teal" id="mCout">—</span></div>
    <div class="mrow"><span class="mlabel">Votre solde</span><span class="mval" id="mSolde">—</span></div>
    <div class="mrow"><span class="mlabel">Solde après</span><span class="mval" id="mApres">—</span></div>
    <div class="mrow"><span class="mlabel">Gain / jour</span><span class="mval teal" id="mGain">—</span></div>
    <div class="mrow"><span class="mlabel">Durée</span><span class="mval">100 jours</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" id="btnOk" onclick="confirmer()">✅ Valider</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Accueil</a>
  <a href="produits.html" class="nav-item active"><span class="ni">💲</span>Produit<div class="nav-dot"></div></a>
  <a href="parrainage.html" class="nav-item"><span class="ni">👥</span>Équipes</a>
  <a href="compte.html" class="nav-item"><span class="ni">👤</span>Mon compte</a>
</nav>

<script src="api.js"></script>
<script>
VE.checkAuth();
let solde=0,planChoisi=null,profil=null,investActif=null;

const STYLE={
  Starter:{c:"p-starter",r:null},Bronze:{c:"p-bronze",r:null},
  Silver:{c:"p-silver",r:null},Gold:{c:"p-gold",r:"⭐ Populaire"},
  Premium:{c:"p-premium",r:null},VIP:{c:"p-vip",r:"👑 VIP"},
  Cold:{c:"p-cold",r:"❄️ Cold"}
};

async function init(){
  // Charger profil
  await VE.getUser();
  profil=await VE.getProfile();
  if(!profil){VE.logout();return;}
  solde=parseFloat(profil.solde)||0;
  document.getElementById("soldePill").textContent=solde.toLocaleString();

  // Investissement actif
  const inv=await VE.select("investissements","?user_id=eq."+profil.id+"&statut=eq.actif&limit=1");
  investActif=inv&&inv.length>0?inv[0]:null;

  // Charger plans
  const plans=await VE.select("plans","?actif=eq.true&order=investissement.asc");
  if(!plans||!plans.length){
    document.getElementById("plansList").innerHTML='<div class="loading">❌ Erreur de chargement</div>';
    return;
  }
  render(plans);
}

function render(plans){
  document.getElementById("plansList").innerHTML=plans.map(p=>{
    const s=STYLE[p.nom]||{c:"p-starter",r:null};
    const estActif=investActif&&investActif.plan_nom===p.nom;
    return `<div class="product-card ${s.c}">
      ${s.r?`<div class="card-ribbon">${s.r}</div>`:""}
      <div class="card-header">
        <div><div class="card-badge">${p.badge}</div><div class="card-name">${p.nom}</div></div>
        <span class="card-tag">${p.tag}</span>
      </div>
      <div class="card-body">
        <div class="card-row"><span class="card-label">💰 Investissement</span><span class="card-value">${parseInt(p.investissement).toLocaleString()} FCFA</span></div>
        <div class="divider"></div>
        <div class="card-row"><span class="card-label">📈 Gain / jour</span><span class="card-value teal">${parseInt(p.revenu_jour).toLocaleString()} FCFA</span></div>
        <div class="card-row"><span class="card-label">⏳ Durée</span><span class="card-value">100 jours</span></div>
        <div class="card-row"><span class="card-label">💵 Total</span><span class="card-value">${parseInt(p.total_gain).toLocaleString()} FCFA</span></div>
      </div>
      <button class="btn-invest${estActif?" actif":""}" onclick='${estActif?"location.href=\"tache.html\"":"openModal("+JSON.stringify(p)+")"}'>
        ${estActif?"⛽ Faire ma tâche du jour →":"Investir maintenant"}
      </button>
    </div>`;
  }).join("");
}

function openModal(p){
  planChoisi=p;
  const apres=solde-p.investissement;
  const ok=solde>=p.investissement;
  document.getElementById("mTitle").textContent=p.badge+" Plan "+p.nom;
  document.getElementById("mPlan").textContent="Plan "+p.nom;
  document.getElementById("mCout").textContent=parseInt(p.investissement).toLocaleString()+" FCFA";
  document.getElementById("mSolde").textContent=solde.toLocaleString()+" FCFA";
  document.getElementById("mApres").textContent=ok?apres.toLocaleString()+" FCFA":"—";
  document.getElementById("mApres").className="mval "+(ok?"green":"red");
  document.getElementById("mGain").textContent=parseInt(p.revenu_jour).toLocaleString()+" FCFA / jour";
  document.getElementById("mInsuff").className="insuff"+(ok?"":" show");
  document.getElementById("btnOk").disabled=!ok;
  document.getElementById("mAlert").className="malert";
  document.getElementById("modalBg").classList.add("show");
}

function closeModal(){document.getElementById("modalBg").classList.remove("show");}

async function confirmer(){
  const btn=document.getElementById("btnOk");
  btn.disabled=true;btn.textContent="⏳...";
  const d=await VE.rpc("acheter_plan",{p_user_id:profil.id,p_plan_nom:planChoisi.nom});
  const al=document.getElementById("mAlert");
  if(d&&d.success){
    al.textContent="✅ Plan "+planChoisi.nom+" activé ! Redirection...";
    al.className="malert ok show";
    localStorage.setItem("invest_id",d.invest_id);
    localStorage.setItem("invest_produit",planChoisi.nom);
    localStorage.setItem("invest_revenu",planChoisi.revenu_jour);
    setTimeout(()=>{closeModal();location.href="tache.html";},1500);
  }else{
    al.textContent="❌ "+(d&&d.error?d.error:"Erreur");
    al.className="malert err show";
    btn.disabled=false;btn.textContent="✅ Valider";
  }
}
init();
</script>
</body>
</html>
