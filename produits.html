<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Produits — Velero Energy</title>
  <script src="/pwa-install.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #f5f0ee;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrap {
      width: 100%;
      max-width: 480px;
      padding-bottom: 80px;
    }
    .topbar {
      background: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 17px;
      font-weight: 700;
    }
    .solde-pill {
      background: #e0f7fa;
      color: #00838f;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .section-header {
      margin: 14px 14px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sh-bar {
      width: 4px;
      height: 28px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .sh-bar.teal {
      background: linear-gradient(135deg, #00bcd4, #0097a7);
    }
    .sh-bar.gold {
      background: linear-gradient(135deg, #ffd700, #ffa000);
    }
    .sh-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 900;
    }
    .sh-sub {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .prod-card {
      margin: 0 14px 12px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      position: relative;
    }
    .prod-img-wrap {
      position: relative;
      height: 130px;
      overflow: hidden;
    }
    .prod-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
    }
    .prod-img-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px 14px;
    }
    .prod-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      width: fit-content;
    }
    .prod-badge-icon {
      font-size: 14px;
    }
    .prod-gain-pill {
      align-self: flex-end;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .prod-body {
      background: #fff;
      padding: 16px;
    }
    .prod-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 900;
      color: #0f2a3a;
      margin-bottom: 12px;
    }
    .prod-stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .ps-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .ps-val {
      font-size: 14px;
      font-weight: 800;
      color: #00bcd4;
      font-family: 'Playfair Display', serif;
    }
    .ps-lbl {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }
    .final-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .fs-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .fs-val {
      font-size: 16px;
      font-weight: 900;
      font-family: 'Playfair Display', serif;
    }
    .fs-lbl {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }
    .fs-box.gain .fs-val {
      color: #4caf50;
    }
    .fs-box.invest .fs-val {
      color: #00bcd4;
    }
    .fs-box.profit .fs-val {
      color: #ffa000;
    }
    .profit-bar-wrap {
      margin-bottom: 14px;
    }
    .profit-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }
    .profit-bar {
      background: #f0f0f0;
      border-radius: 20px;
      height: 7px;
    }
    .profit-fill {
      border-radius: 20px;
      height: 100%;
    }
    .btn-invest {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
      transition: opacity .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-invest:active {
      transform: scale(.98);
    }
    .btn-invest.actif {
      background: linear-gradient(135deg, #4caf50, #388e3c) !important;
    }
    .actif-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #4caf50;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      z-index: 2;
    }
    .separator {
      margin: 6px 14px 14px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
    }
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-bg.show {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      animation: su .3s ease;
    }
    @keyframes su {
      from { transform: translateY(100%) }
      to { transform: translateY(0) }
    }
    .modal-plan-img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 14px;
      object-position: center 60%;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .modal-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .mrow {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .mrow:last-of-type {
      border-bottom: none;
    }
    .mlbl {
      color: #888;
    }
    .mval {
      font-weight: 700;
    }
    .mval.teal { color: #00bcd4; }
    .mval.green { color: #4caf50; }
    .mval.red { color: #e53935; }
    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: #f5f5f5;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      color: #666;
    }
    .btn-ok {
      flex: 2;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #00bcd4, #0097a7);
    }
    .btn-ok:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .malert {
      padding: 10px 13px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .malert.show { display: block; }
    .malert.err {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
    }
    .malert.ok {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
    }
    .insuff {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      color: #f57f17;
      margin-bottom: 12px;
      display: none;
    }
    .insuff.show { display: block; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-top: 1px solid #f0ebe8;
      display: flex;
      padding: 8px 0 12px;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #ccc;
      font-size: 10px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-item.active {
      color: #00bcd4;
    }
    .nav-item .ni {
      font-size: 21px;
    }
    .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00bcd4;
      margin: 1px auto 0;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="topbar-title">📦 Produits</span>
    <span class="solde-pill">💰 <span id="soldePill">...</span> FCFA</span>
  </div>
  <div id="mainContent"><div class="loading">⏳ Chargement...</div></div>
</div>

<!-- MODAL CONFIRMATION -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <img class="modal-plan-img" id="mImg" src="https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg" alt="Plan">
    <div class="modal-title" id="mTitle">Confirmer</div>
    <div class="modal-sub" id="mSub">Vérifiez avant de valider</div>
    <div class="malert" id="mAlert"></div>
    <div class="insuff" id="mInsuff">⚠️ Solde insuffisant — <a href="recharge.html" style="color:#00bcd4;font-weight:700;">Recharger →</a></div>
    <div class="mrow"><span class="mlbl">Plan</span><span class="mval" id="mPlan">—</span></div>
    <div class="mrow"><span class="mlbl">Investissement</span><span class="mval teal" id="mCout">—</span></div>
    <div class="mrow"><span class="mlbl">Votre solde</span><span class="mval" id="mSolde">—</span></div>
    <div class="mrow"><span class="mlbl">Solde après</span><span class="mval" id="mApres">—</span></div>
    <div class="mrow" id="mGainRow"><span class="mlbl" id="mGainLabel">Gain</span><span class="mval green" id="mGain">—</span></div>
    <div class="mrow"><span class="mlbl">Durée</span><span class="mval" id="mDuree">—</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" id="btnOk" onclick="confirmer()">✅ Investir maintenant</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Accueil</a>
  <a href="produits.html" class="nav-item active"><span class="ni">💲</span>Produit<div class="nav-dot"></div></a>
  <a href="parrainage.html" class="nav-item"><span class="ni">👥</span>Équipes</a>
  <a href="compte.html" class="nav-item"><span class="ni">👤</span>Mon compte</a>
</nav>

<script>
  const SB = "https://seegoklunovyuieorkvy.supabase.co";
  const AK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZWdva2x1bm92eXVpZW9ya3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI3MjYsImV4cCI6MjA5NTI1ODcyNn0.9p2OcUAY25E6XhG4Uq7XYTab_N2FWrg_dtemrUEroeo";
  function tok() { return localStorage.getItem("velero_token") || ""; }
  function uid() { return localStorage.getItem("velero_uid") || ""; }
  function H() { return { "Content-Type": "application/json", "apikey": AK, "Authorization": "Bearer " + tok() }; }

  const VELERO_IMG = "https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg";

  let solde = 0, planChoisi = null, profil = null, mesInvests = [];

  async function init() {
    if (!tok()) { location.href = "index.html"; return; }
    await loadUser();
    const plans = await fetch(SB + "/rest/v1/plans?actif=eq.true&order=investissement.asc", { headers: H() }).then(r => r.json());
    mesInvests = await fetch(SB + "/rest/v1/investissements?user_id=eq." + uid() + "&statut=eq.actif", { headers: H() }).then(r => r.json()) || [];
    render(plans);
  }

  async function loadUser() {
    const r = await fetch(SB + "/rest/v1/profiles?id=eq." + uid() + "&select=*", { headers: H() });
    const d = await r.json();
    profil = d[0] || null;
    if (profil) {
      solde = parseFloat(profil.solde) || 0;
      document.getElementById("soldePill").textContent = solde.toLocaleString();
    }
  }

  function countInvest(nomPlan) {
    return mesInvests.filter(i => i.plan_nom === nomPlan).length;
  }

  function render(plans) {
    // Séparation stricte : type_gain === 'journalier' vs 'final'
    const jour = plans.filter(p => p.type_gain === 'journalier');
    const final = plans.filter(p => p.type_gain === 'final');

    let html = '';

    // SECTION GAINS JOURNALIERS
    html += `<div class="section-header">
      <div class="sh-bar teal"></div>
      <div>
        <div class="sh-title">⚡ Gains Journaliers</div>
        <div class="sh-sub">Recevez vos gains chaque jour via une tâche</div>
      </div>
    </div>`;
    if (jour.length === 0) {
      html += `<div style="margin:0 14px 14px; color:#999; font-size:14px; padding:8px;">Aucun plan journalier disponible.</div>`;
    } else {
      jour.forEach(p => {
        const nb = countInvest(p.nom);
        const peutInvestir = nb < 2;
        const profit = p.total_gain - p.investissement;
        const profitPct = Math.round((profit / p.investissement) * 100);
        html += prodCard(p, 'journalier', nb, peutInvestir, profit, profitPct);
      });
    }

    html += `<div class="separator"></div>`;

    // SECTION GAINS À TERME
    html += `<div class="section-header">
      <div class="sh-bar gold"></div>
      <div>
        <div class="sh-title">🏆 Gains à Terme</div>
        <div class="sh-sub">Recevez votre gain total à la fin du contrat</div>
      </div>
    </div>`;
    if (final.length === 0) {
      html += `<div style="margin:0 14px 14px; color:#999; font-size:14px; padding:8px;">Aucun plan à terme disponible.</div>`;
    } else {
      final.forEach(p => {
        const nb = countInvest(p.nom);
        const peutInvestir = nb < 2;
        const profit = p.total_gain - p.investissement;
        const profitPct = Math.round((profit / p.investissement) * 100);
        html += prodCard(p, 'final', nb, peutInvestir, profit, profitPct);
      });
    }

    document.getElementById("mainContent").innerHTML = html;
  }

  function prodCard(p, type, nb, peutInvestir, profit, profitPct) {
    const isJour = type === 'journalier';
    const estActif = nb > 0;
    return `<div class="prod-card">
      ${estActif ? `<div class="actif-badge">✅ Actif (${nb}/2)</div>` : ""}
      <div class="prod-img-wrap">
        <img src="${VELERO_IMG}" alt="${p.nom}" onerror="this.src='https://images.unsplash.com/photo-1545459720-aac8509eb61d?w=800'">
        <div class="prod-img-overlay">
          <div class="prod-badge">
            <span class="prod-badge-icon">${p.badge || '💎'}</span>
            <span>${p.tag || 'Plan'}</span>
          </div>
          <div class="prod-gain-pill">${isJour ? "+" + parseInt(p.revenu_jour).toLocaleString() + " FCFA/jour" : "+" + parseInt(profit).toLocaleString() + " FCFA gain"}</div>
        </div>
      </div>
      <div class="prod-body">
        <div class="prod-name">${p.nom}</div>
        ${isJour ? `
          <div class="prod-stats">
            <div class="ps-box"><div class="ps-val">${parseInt(p.investissement).toLocaleString()}</div><div class="ps-lbl">FCFA investis</div></div>
            <div class="ps-box"><div class="ps-val">${parseInt(p.revenu_jour).toLocaleString()}</div><div class="ps-lbl">FCFA/jour</div></div>
            <div class="ps-box"><div class="ps-val">${p.duree_jours}j</div><div class="ps-lbl">Durée</div></div>
          </div>
          <div class="profit-bar-wrap">
            <div class="profit-label"><span>Retour sur investissement</span><span style="color:#4caf50;font-weight:700;">+${profitPct}%</span></div>
            <div class="profit-bar"><div class="profit-fill" style="width:${Math.min(profitPct,100)}%;background:linear-gradient(90deg,#00bcd4,#4caf50);"></div></div>
          </div>` : `
          <div class="final-stats">
            <div class="fs-box invest"><div class="fs-val">${parseInt(p.investissement).toLocaleString()} F</div><div class="fs-lbl">💰 Investissement</div></div>
            <div class="fs-box gain"><div class="fs-val">${parseInt(p.total_gain).toLocaleString()} F</div><div class="fs-lbl">🎯 Gain total</div></div>
            <div class="fs-box profit"><div class="fs-val">+${parseInt(profit).toLocaleString()} F</div><div class="fs-lbl">📈 Bénéfice</div></div>
            <div class="fs-box"><div class="fs-val">${p.duree_jours} jours</div><div class="fs-lbl">⏳ Durée</div></div>
          </div>`}
        <button class="btn-invest ${!peutInvestir ? 'actif' : ''}" 
          style="background:${p.couleur || 'linear-gradient(135deg,#00bcd4,#0097a7)'};"
          onclick='openModal(${JSON.stringify(p)})'>
          ${!peutInvestir ? "✅ Maximum atteint (2/2)" : estActif ? "➕ Investir encore →" : "💰 Investir maintenant →"}
        </button>
      </div>
    </div>`;
  }

  function openModal(p) {
    planChoisi = p;
    const isJour = p.type_gain === 'journalier';
    const apres = solde - p.investissement;
    const ok = solde >= p.investissement;
    document.getElementById("mTitle").textContent = (p.badge || '💎') + " " + p.nom;
    document.getElementById("mSub").textContent = isJour ? "Plan à gains journaliers" : "Plan à gain final";
    document.getElementById("mPlan").textContent = p.nom;
    document.getElementById("mCout").textContent = parseInt(p.investissement).toLocaleString() + " FCFA";
    document.getElementById("mSolde").textContent = solde.toLocaleString() + " FCFA";
    document.getElementById("mApres").textContent = ok ? apres.toLocaleString() + " FCFA" : "Solde insuffisant";
    document.getElementById("mApres").className = "mval " + (ok ? "green" : "red");
    document.getElementById("mGainLabel").textContent = isJour ? "Gain / jour" : "Gain total à terme";
    document.getElementById("mGain").textContent = isJour ? parseInt(p.revenu_jour).toLocaleString() + " FCFA/jour" : parseInt(p.total_gain).toLocaleString() + " FCFA";
    document.getElementById("mDuree").textContent = p.duree_jours + " jours";
    document.getElementById("mInsuff").className = "insuff" + (ok ? "" : " show");
    document.getElementById("btnOk").disabled = !ok;
    document.getElementById("mAlert").className = "malert";
    document.getElementById("modalBg").classList.add("show");
  }

  function closeModal() {
    document.getElementById("modalBg").classList.remove("show");
  }

  async function confirmer() {
    const btn = document.getElementById("btnOk");
    btn.disabled = true;
    btn.textContent = "⏳...";
    const d = await fetch(SB + "/rest/v1/rpc/acheter_plan", {
      method: "POST",
      headers: H(),
      body: JSON.stringify({ p_user_id: uid(), p_plan_nom: planChoisi.nom })
    }).then(r => r.json());

    const al = document.getElementById("mAlert");
    if (d && d.success) {
      al.textContent = "✅ " + planChoisi.nom + " activé ! Redirection...";
      al.className = "malert ok show";
      localStorage.setItem("invest_id", d.invest_id);
      localStorage.setItem("invest_produit", planChoisi.nom);
      localStorage.setItem("invest_revenu", planChoisi.revenu_jour || 0);
      localStorage.setItem("invest_type", planChoisi.type_gain || "journalier");
      const isJour = planChoisi.type_gain === 'journalier';
      setTimeout(() => { closeModal(); location.href = isJour ? "tache.html" : "contrats.html"; }, 1500);
    } else {
      al.textContent = "❌ " + (d && d.error ? d.error : "Erreur");
      al.className = "malert err show";
      btn.disabled = false;
      btn.textContent = "✅ Investir maintenant";
    }
  }

  init();
</script>
</body>
</html>
