<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Dashboard — Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0ee;font-family:'DM Sans',sans-serif;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:480px;padding-bottom:80px;}

/* SLIDER */
.slider{position:relative;width:100%;height:270px;overflow:hidden;}
.slides{display:flex;height:100%;transition:transform .5s ease;}
.slide{min-width:100%;height:100%;position:relative;flex-shrink:0;}
.slide img{width:100%;height:100%;object-fit:cover;object-position:center;}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.65) 100%);}
.dots{position:absolute;bottom:70px;right:16px;display:flex;gap:5px;z-index:10;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .3s;}
.dot.active{background:#fff;width:18px;border-radius:4px;}

/* PROFIL */
.profile-overlay{position:absolute;bottom:60px;left:16px;display:flex;align-items:center;gap:12px;z-index:10;}
.avatar-wrap{position:relative;}
.avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#00bcd4,#0097a7);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.85);font-family:'Playfair Display',serif;}
.edit-btn{position:absolute;bottom:0;right:0;width:20px;height:20px;background:#00bcd4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid #fff;cursor:pointer;}
.user-name{font-size:19px;font-weight:700;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.5);}
.level-pill{display:inline-block;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.6);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;margin-top:4px;}

/* BOUTONS RAPIDES SUR LE SLIDER */
.action-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;display:flex;gap:10px;align-items:center;z-index:10;background:linear-gradient(0deg,rgba(0,0,0,.5),transparent);}
.btn-recharge{background:#00bcd4;color:#fff;border:none;border-radius:14px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px rgba(0,188,212,.4);}
.btn-commencer{flex:1;background:#fff;color:#00bcd4;border:none;border-radius:14px;padding:10px 0;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);}

/* SOLDE */
.balance-row{display:flex;gap:10px;padding:14px 14px 6px;}
.balance-card{flex:1;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);border-top:3px solid #00bcd4;}
.bc-label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.bc-amount{font-size:22px;font-weight:800;color:#1a1a1a;font-family:'Playfair Display',serif;}

/* MENU */
.menu-section{padding:12px 14px 6px;}
.menu-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
.menu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.menu-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:#fff;border:none;border-radius:14px;padding:12px 4px;cursor:pointer;color:#444;font-size:10px;font-weight:600;text-align:center;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;font-family:'DM Sans',sans-serif;}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,188,212,.18);}
.mi{width:34px;height:34px;border-radius:10px;background:#fff5f5;display:flex;align-items:center;justify-content:center;font-size:17px;margin:0 auto;}

/* LOGOUT */
.logout-wrap{padding:12px 14px;}
.btn-logout{width:100%;padding:12px;background:#fff;border:1.5px solid #00bcd4;border-radius:13px;color:#00bcd4;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0ebe8;display:flex;padding:8px 0 12px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#ccc;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;}
.nav-item.active{color:#00bcd4;}
.nav-item .ni{font-size:21px;}
.nav-dot{width:5px;height:5px;border-radius:50%;background:#00bcd4;margin:1px auto 0;}
</style>
</head>
<body>
<div class="wrap">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slides" id="slides">
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1545459720-aac8509eb61d?w=800&q=80" alt="Station 1" onerror="this.src='https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg'"/>
        <div class="slide-overlay"></div>
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1611538400436-84a7095b0d97?w=800&q=80" alt="Station 2" onerror="this.src='https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg'"/>
        <div class="slide-overlay"></div>
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=800&q=80" alt="Station 3" onerror="this.src='https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg'"/>
        <div class="slide-overlay"></div>
      </div>
    </div>

    <!-- Profil -->
    <div class="profile-overlay">
      <div class="avatar-wrap">
        <div class="avatar" id="av">A</div>
        <div class="edit-btn">✏️</div>
      </div>
      <div>
        <div class="user-name" id="uname">Mon compte</div>
        <div class="level-pill">LV1</div>
      </div>
    </div>

    <!-- Dots -->
    <div class="dots">
      <div class="dot active" onclick="goTo(0)"></div>
      <div class="dot" onclick="goTo(1)"></div>
      <div class="dot" onclick="goTo(2)"></div>
    </div>

    <!-- Boutons action -->
    <div class="action-bar">
      <button class="btn-recharge" onclick="location.href='recharge.html'">💳 Recharger</button>
      <button class="btn-commencer" onclick="location.href='investir.html'">🚀 Commencer à investir</button>
    </div>
  </div>

  <!-- SOLDE -->
  <div class="balance-row">
    <div class="balance-card">
      <div class="bc-label">Solde</div>
      <div class="bc-amount">$ 0.00</div>
    </div>
    <div class="balance-card">
      <div class="bc-label">Revenus cumulés</div>
      <div class="bc-amount">$ 0.00</div>
    </div>
  </div>

  <!-- MENU INFORMATIONS -->
  <div class="menu-section">
    <div class="menu-title">Informations</div>
    <div class="menu-grid">
      <a href="about.html" class="menu-btn"><div class="mi">ℹ️</div>À propos</a>
      <a href="reglement.html" class="menu-btn"><div class="mi">📜</div>Règlement</a>
      <a href="historique.html" class="menu-btn"><div class="mi">🕐</div>Historique</a>
      <a href="support.html" class="menu-btn"><div class="mi">💬</div>Support</a>
    </div>
  </div>

  <!-- MENU SERVICES -->
  <div class="menu-section">
    <div class="menu-title">Services</div>
    <div class="menu-grid">
      <a href="retrait.html" class="menu-btn"><div class="mi">💸</div>Retrait</a>
      <a href="banque.html" class="menu-btn"><div class="mi">🏦</div>Banque</a>
      <a href="securite.html" class="menu-btn"><div class="mi">🔑</div>Sécurité</a>
      <a href="offres.html" class="menu-btn"><div class="mi">🎁</div>Offres</a>
      <a href="parrainage.html" class="menu-btn"><div class="mi">🤝</div>Parrainage</a>
      <a href="contrats.html" class="menu-btn"><div class="mi">📋</div>Contrats</a>
      <a href="equipes.html" class="menu-btn"><div class="mi">👥</div>Équipes</a>
      <a href="parametres.html" class="menu-btn"><div class="mi">⚙️</div>Paramètres</a>
    </div>
  </div>

  <!-- DÉCONNEXION -->
  <div class="logout-wrap">
    <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
  </div>
</div>

<!-- NAV BAS -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <span class="ni">🏠</span>Accueil
    <div class="nav-dot"></div>
  </a>
  <a href="produits.html" class="nav-item"><span class="ni">💲</span>Produit</a>
  <a href="equipes.html" class="nav-item"><span class="ni">👥</span>Équipes</a>
  <a href="compte.html" class="nav-item"><span class="ni">👤</span>Mon compte</a>
</nav>

<script>
const token=localStorage.getItem("velero_token");
const email=localStorage.getItem("velero_email");
if(!token){window.location.href="index.html";}
if(email){
  const n=email.split("@")[0];
  document.getElementById("uname").textContent=n.charAt(0).toUpperCase()+n.slice(1);
  document.getElementById("av").textContent=n[0].toUpperCase();
}

let cur=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dot");
function goTo(i){
  cur=i;
  slides.style.transform="translateX(-"+i*100+"%)";
  dots.forEach((d,idx)=>d.classList.toggle("active",idx===i));
}
setInterval(()=>goTo((cur+1)%3),3500);

function logout(){
  localStorage.removeItem("velero_token");
  localStorage.removeItem("velero_email");
  window.location.href="index.html";
}
</script>
</body>
</html>
