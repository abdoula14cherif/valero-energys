<!-- 
  BOUTON INSTALLER L'APPLICATION
  À coller dans dashboard.html juste avant la section menu-section Services
  Le bouton se cache automatiquement si l'app est déjà installée
-->

<div id="btnInstallPWA" style="
  display:none;
  margin:12px 14px 0;
  background:linear-gradient(135deg,#1c2b30,#2d4a55);
  border-radius:18px;
  padding:16px 18px;
  align-items:center;
  gap:14px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
" onclick="installPWA()">
  <div style="
    width:44px;height:44px;border-radius:14px;
    background:linear-gradient(135deg,#00bcd4,#0097a7);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  ">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </div>
  <div style="flex:1;">
    <div style="font-size:14px;font-weight:700;color:#fff;">Installer l'application</div>
    <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;">Acces rapide depuis votre ecran d'accueil</div>
  </div>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</div>
