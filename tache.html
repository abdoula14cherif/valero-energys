<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#00bcd4"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Velero Energy"/>
<title>Tâche du Jour — Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0ee;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:480px;padding-bottom:90px;}

.topbar{background:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);position:sticky;top:0;z-index:50;}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;}
.topbar-title{font-size:17px;font-weight:700;}

.page-header{margin:16px 14px 4px;display:flex;align-items:center;gap:10px;}
.ph-bar{width:4px;height:28px;border-radius:4px;background:linear-gradient(135deg,#00bcd4,#0097a7);flex-shrink:0;}
.ph-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;}
.ph-sub{font-size:12px;color:#888;margin-top:2px;}

.alert{padding:10px 13px;border-radius:10px;font-size:13px;margin:0 14px 12px;display:none;}
.alert.show{display:block;}
.alert-error{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;}
.alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}

/* PLAN CARD */
.plan-card{margin:0 14px 16px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.09);}
.pc-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#e0f7fa,#b2ebf2);}
.pc-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:#0f2a3a;}
.pc-date{font-size:11px;color:#00838f;font-weight:600;}
.pc-body{padding:20px 18px;display:flex;flex-direction:column;align-items:center;gap:16px;}

/* ROUE */
.wheel-wrapper{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
.wheel-pointer{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:10;font-size:22px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
.wheel-center{position:absolute;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:18px;}

/* GAIN ROW */
.gain-row{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;width:100%;}
.gr-label{font-size:13px;font-weight:600;color:#555;}
.gr-val{font-size:18px;font-weight:900;color:#00bcd4;font-family:'Playfair Display',serif;}

/* BTN */
.btn-spin{width:100%;padding:14px;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;font-size:14px;font-weight:800;border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.btn-spin:disabled{opacity:.45;cursor:not-allowed;}

/* COOLDOWN dans la carte */
.cd-box{width:100%;background:#f0f7f9;border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.cd-done{font-size:13px;font-weight:700;color:#15803d;}
.cd-gain-inline{font-size:22px;font-weight:900;color:#15803d;font-family:'Playfair Display',serif;}
.cd-timer-label{font-size:11px;color:#90a4ae;font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.cd-timer{font-size:24px;font-weight:900;font-family:'Playfair Display',serif;color:#0097a7;letter-spacing:2px;}

/* EMPTY */
.empty-card{margin:30px 14px;background:#fff;border-radius:20px;padding:36px 20px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.07);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:800;color:#0f2a3a;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#aaa;margin-bottom:18px;}
.btn-go{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;font-size:14px;font-weight:800;border-radius:12px;text-decoration:none;font-family:'DM Sans',sans-serif;}

/* HIST */
.hist-section{margin:0 14px 12px;}
.hist-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.hist-item{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.hi-left{display:flex;align-items:center;gap:10px;}
.hi-date{font-size:12px;font-weight:600;}
.hi-plan{font-size:11px;color:#aaa;margin-top:1px;}
.hi-gain{font-size:14px;font-weight:800;color:#00bcd4;}

/* OVERLAY */
.spin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spin-overlay.show{display:flex;}
.so-pointer{font-size:32px;margin-bottom:-8px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
.spin-result{background:#fff;border-radius:20px;padding:24px 32px;text-align:center;display:none;flex-direction:column;align-items:center;gap:10px;}
.spin-result.show{display:flex;}
.sr-emoji{font-size:52px;}
.sr-msg{font-size:16px;font-weight:700;color:#333;}
.sr-plan{font-size:12px;color:#aaa;}
.sr-gain{font-size:34px;font-weight:900;color:#15803d;font-family:'Playfair Display',serif;}
.sr-btn{margin-top:10px;padding:12px 32px;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;font-size:14px;font-weight:800;border:none;border-radius:11px;cursor:pointer;font-family:inherit;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0ebe8;display:flex;padding:8px 0 12px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#ccc;font-size:10px;font-weight:600;}
.nav-item.active{color:#00bcd4;}
.nav-item .ni{font-size:21px;}
</style>
</head>
<body>
<script src="/pwa-install.js"></script>
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="topbar-title">⛽ Tâche du Jour</span>
  </div>

  <div class="page-header">
    <div class="ph-bar"></div>
    <div>
      <div class="ph-title">Mes tâches du jour</div>
      <div class="ph-sub" id="dayDate"></div>
    </div>
  </div>

  <div id="alertBox" class="alert"></div>
  <div id="cardsContainer"></div>

  <div class="hist-section" id="histSection" style="display:none;">
    <div class="hist-title">Dernières tâches</div>
    <div id="histList"></div>
  </div>
</div>

<!-- OVERLAY SPIN -->
<div class="spin-overlay" id="spinOverlay">
  <div class="so-pointer">▼</div>
  <canvas id="wheelBig" width="270" height="270"></canvas>
  <div class="spin-result" id="spinResult">
    <div class="sr-emoji">🎉</div>
    <div class="sr-msg">Félicitations !</div>
    <div class="sr-plan" id="srPlan"></div>
    <div class="sr-gain" id="srGain">+0 FCFA</div>
    <button class="sr-btn" onclick="fermerOverlay()">Continuer →</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Accueil</a>
  <a href="produits.html" class="nav-item active"><span class="ni">💲</span>Produit</a>
  <a href="parrainage.html" class="nav-item"><span class="ni">👥</span>Équipes</a>
  <a href="compte.html" class="nav-item"><span class="ni">👤</span>Mon compte</a>
</nav>

<script src="api.js"></script>
<script>
if(!VE.checkAuth())window.location.href="index.html";

const SEGMENTS=["⚡","💧","🔥","⛽","💡","🌊","🛢️","⚙️"];
const COLORS=["#00bcd4","#0097a7","#26c6da","#00838f","#4dd0e1","#006064","#80deea","#00acc1"];

let profil=null, investsActifs=[], tachesAujourd=[], spinning=false, investEnCours=null;
const timers={};

document.getElementById("dayDate").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

function drawWheel(canvas,angle=0){
  const ctx=canvas.getContext("2d");
  const cx=canvas.width/2,cy=canvas.height/2,r=cx-6;
  const arc=2*Math.PI/SEGMENTS.length;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  SEGMENTS.forEach((seg,i)=>{
    const start=angle+i*arc,end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign="right";ctx.font=`bold ${canvas.width<230?"13":"17"}px sans-serif`;
    ctx.fillText(seg,r-8,5);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,canvas.width<230?16:22,0,2*Math.PI);
  ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#00bcd4";ctx.lineWidth=3;ctx.stroke();
}

async function init(){
  profil=await VE.getProfile();
  if(!profil){location.href="index.html";return;}

  // Tous les investissements actifs — pas de limit, pas de filtre sur plan_nom
  investsActifs=await VE.select("investissements","?user_id=eq."+profil.id+"&statut=eq.actif&order=created_at.asc")||[];

  // Tâches d'aujourd'hui
  const today=new Date().toISOString().split("T")[0];
  tachesAujourd=await VE.select("taches","?user_id=eq."+profil.id+"&date_tache=eq."+today)||[];

  renderCards();

  // Historique 5 dernières
  const hist=await VE.select("taches","?user_id=eq."+profil.id+"&order=created_at.desc&limit=5")||[];
  if(hist.length>0){
    document.getElementById("histSection").style.display="block";
    document.getElementById("histList").innerHTML=hist.map(h=>`
      <div class="hist-item">
        <div class="hi-left">
          <span style="font-size:20px;">⛽</span>
          <div>
            <div class="hi-date">${new Date(h.created_at).toLocaleDateString("fr-FR")}</div>
            <div class="hi-plan">${h.plan_nom||"Gain quotidien"}</div>
          </div>
        </div>
        <span class="hi-gain">+${parseFloat(h.gain).toLocaleString()} FCFA</span>
      </div>`).join("");
  }
}

function renderCards(){
  const container=document.getElementById("cardsContainer");

  // Filtrer : exclure les plans à gain final (ceux-là vont sur contrats.html)
  const invests=investsActifs.filter(inv=>inv.type_gain!=="final");

  if(invests.length===0){
    container.innerHTML=`
      <div class="empty-card">
        <div class="empty-icon">⛽</div>
        <div class="empty-title">Aucun plan actif</div>
        <div class="empty-sub">Investissez dans un plan journalier pour débloquer vos tâches quotidiennes.</div>
        <a href="produits.html" class="btn-go">Voir les plans →</a>
      </div>`;
    return;
  }

  container.innerHTML=invests.map((inv,idx)=>{
    const gainJour=parseFloat(inv.revenu_jour)||0;
    // Tâche faite aujourd'hui pour CET investissement ?
    const tacheFaite=tachesAujourd.find(t=>t.investissement_id===inv.id);
    const canvasId="wheel_"+idx;
    return `
    <div class="plan-card" id="card_${idx}">
      <div class="pc-header">
        <div>
          <div class="pc-name">⛽ ${inv.plan_nom}</div>
          <div style="font-size:11px;color:#607d8b;margin-top:2px;">Jours restants : <strong>${inv.jours_restants}</strong></div>
        </div>
        <div class="pc-date">${new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short"})}</div>
      </div>
      <div class="pc-body">
        ${tacheFaite ? cooldownHTML(inv,tacheFaite,idx) : activeHTML(inv,gainJour,canvasId,idx)}
      </div>
    </div>`;
  }).join("");

  // Dessiner les mini-roues et lancer les timers
  invests.forEach((inv,idx)=>{
    const tacheFaite=tachesAujourd.find(t=>t.investissement_id===inv.id);
    if(!tacheFaite){
      const c=document.getElementById("wheel_"+idx);
      if(c)drawWheel(c);
    }else{
      const nextAvailable=new Date(new Date(tacheFaite.created_at).getTime()+24*60*60*1000);
      lancerTimer(idx,nextAvailable);
    }
  });

  // Dessiner la big wheel overlay
  drawWheel(document.getElementById("wheelBig"));
}

function activeHTML(inv,gainJour,canvasId,idx){
  return `
    <div class="wheel-wrapper">
      <div class="wheel-pointer">▼</div>
      <canvas id="${canvasId}" width="190" height="190"></canvas>
      <div class="wheel-center">⛽</div>
    </div>
    <div class="gain-row">
      <span class="gr-label">💰 Gain du jour</span>
      <span class="gr-val">${gainJour.toLocaleString()} FCFA</span>
    </div>
    <button class="btn-spin" onclick="lancerRoue(${idx})">🎰 Récupérer mon gain</button>`;
}

function cooldownHTML(inv,tache,idx){
  const gain=parseFloat(tache.gain||inv.revenu_jour||0);
  return `
    <div class="cd-box" id="cdbox_${idx}">
      <div class="cd-done">✅ Tâche effectuée aujourd'hui</div>
      <div class="cd-gain-inline">+${gain.toLocaleString()} FCFA</div>
      <div style="font-size:11px;color:#aaa;">crédités sur votre compte</div>
      <div style="height:1px;background:#e0f7fa;width:100%;margin:4px 0;"></div>
      <div class="cd-timer-label">⏰ Prochaine tâche dans</div>
      <div class="cd-timer" id="timer_${idx}">--:--:--</div>
    </div>`;
}

function lancerTimer(idx,nextTime){
  if(timers[idx])clearInterval(timers[idx]);
  function tick(){
    const diff=nextTime-Date.now();
    const el=document.getElementById("timer_"+idx);
    if(!el){clearInterval(timers[idx]);return;}
    if(diff<=0){el.textContent="Disponible !";clearInterval(timers[idx]);return;}
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    el.textContent=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  }
  tick();
  timers[idx]=setInterval(tick,1000);
}

// investEnCours stocke {invest, idx}
function lancerRoue(idx){
  if(spinning)return;
  const invests=investsActifs.filter(inv=>inv.type_gain!=="final");
  const inv=invests[idx];
  if(!inv)return;
  investEnCours={invest:inv,idx};
  spinning=true;
  document.getElementById("spinOverlay").classList.add("show");
  document.getElementById("spinResult").classList.remove("show");

  const bigCanvas=document.getElementById("wheelBig");
  const totalRotation=(5+Math.random()*4)*2*Math.PI;
  const duration=3200;
  const start=performance.now();
  function animate(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-progress,3);
    drawWheel(bigCanvas,totalRotation*ease);
    if(progress<1){requestAnimationFrame(animate);}
    else{valider();}
  }
  requestAnimationFrame(animate);
}

function showAlert(msg,type){
  const el=document.getElementById("alertBox");
  el.textContent=msg;el.className="alert alert-"+type+" show";
  setTimeout(()=>el.classList.remove("show"),4000);
}

async function valider(){
  const {invest}=investEnCours;
  const d=await VE.rpc("valider_tache",{p_user_id:profil.id,p_invest_id:invest.id,p_vehicule:"roue",p_emoji:"⛽"});
  if(d&&d.success){
    const g=parseFloat(d.gain||invest.revenu_jour||0);
    document.getElementById("srGain").textContent="+"+g.toLocaleString()+" FCFA";
    document.getElementById("srPlan").textContent=invest.plan_nom;
    document.getElementById("spinResult").classList.add("show");
  }else{
    document.getElementById("spinOverlay").classList.remove("show");
    spinning=false;
    showAlert("❌ "+((d&&d.error)||"Tâche déjà effectuée."),"error");
    setTimeout(()=>location.reload(),1000);
  }
}

async function fermerOverlay(){
  document.getElementById("spinOverlay").classList.remove("show");
  spinning=false;
  location.reload();
}

init();
</script>
</body>
</html>
