<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#00bcd4"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Velero Energy"/>
<title>Offres & Cadeaux — Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0ee;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;}
.wrap{width:100%;max-width:480px;padding-bottom:80px;}
.topbar{background:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);position:sticky;top:0;z-index:50;}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;}
.topbar-title{font-size:17px;font-weight:700;}

/* Hero */
.hero-banner{margin:14px;background:linear-gradient(135deg,#00bcd4,#0097a7);border-radius:20px;padding:24px;color:#fff;text-align:center;position:relative;overflow:hidden;}
.hero-banner::before{content:'🎁';font-size:80px;position:absolute;right:-10px;top:-10px;opacity:.15;}
.hb-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;margin-bottom:6px;}
.hb-sub{font-size:13px;opacity:.85;margin-bottom:16px;}
.code-input-wrap{display:flex;gap:8px;}
.code-input{flex:1;padding:12px 14px;font-size:16px;font-family:'Playfair Display',serif;font-weight:700;border:2px solid rgba(255,255,255,.4);border-radius:12px;background:rgba(255,255,255,.15);color:#fff;outline:none;text-transform:uppercase;letter-spacing:2px;text-align:center;}
.code-input::placeholder{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:0;font-family:'DM Sans',sans-serif;font-weight:400;}
.code-input:focus{border-color:#fff;}
.btn-appliquer{padding:12px 18px;background:#fff;color:#00bcd4;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit;}

/* Alert */
.alert{padding:10px 13px;border-radius:10px;font-size:13px;margin:10px 14px 0;display:none;}
.alert.show{display:block;}
.err{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;}
.suc{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}

/* Succès animation */
.success-card{margin:14px;background:#fff;border-radius:20px;padding:28px;box-shadow:0 3px 14px rgba(0,0,0,.08);text-align:center;display:none;}
.sc-icon{font-size:64px;margin-bottom:12px;animation:bounce .6s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.sc-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#00bcd4;margin-bottom:6px;}
.sc-montant{font-size:36px;font-weight:900;color:#15803d;font-family:'Playfair Display',serif;margin:12px 0;}
.sc-sub{font-size:13px;color:#888;}

/* Offres actives */
.section{padding:12px 14px 6px;}
.section-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.offre-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.offre-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(135deg,#00bcd4,#0097a7);}
.offre-icon{font-size:32px;flex-shrink:0;}
.offre-info{flex:1;}
.offre-titre{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.offre-desc{font-size:12px;color:#888;margin-bottom:4px;}
.offre-montant{font-size:18px;font-weight:900;color:#00bcd4;font-family:'Playfair Display',serif;}
.offre-expire{font-size:10px;color:#aaa;margin-top:2px;}
.offre-dispo{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#e0f7fa;color:#00838f;flex-shrink:0;}

/* Historique */
.hist-item{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.hi-icon{width:36px;height:36px;border-radius:10px;background:#e0f7fa;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hi-info{flex:1;}
.hi-code{font-size:13px;font-weight:700;color:#1a1a1a;font-family:'Playfair Display',serif;letter-spacing:1px;}
.hi-date{font-size:11px;color:#aaa;margin-top:1px;}
.hi-gain{font-size:15px;font-weight:900;color:#15803d;font-family:'Playfair Display',serif;}

.empty{text-align:center;padding:30px;color:#aaa;}
.empty-icon{font-size:36px;margin-bottom:8px;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0ebe8;display:flex;padding:8px 0 12px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#ccc;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;}
.nav-item.active{color:#00bcd4;}
.nav-item .ni{font-size:21px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="topbar-title">🎁 Offres & Cadeaux</span>
  </div>

  <!-- Hero saisie code -->
  <div class="hero-banner">
    <div class="hb-title">Entrez votre code cadeau</div>
    <div class="hb-sub">Recevez instantanément votre bonus sur votre compte</div>
    <div class="code-input-wrap">
      <input type="text" class="code-input" id="codeInput" placeholder="Ex: VELERO2025" maxlength="20" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn-appliquer" onclick="appliquerCode()">🎁 Utiliser</button>
    </div>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- Succès -->
  <div class="success-card" id="successCard">
    <div class="sc-icon">🎉</div>
    <div class="sc-title">Code appliqué !</div>
    <div class="sc-montant" id="scMontant">+0 FCFA</div>
    <div class="sc-sub">Le montant a été crédité sur votre compte</div>
  </div>

  <!-- Offres disponibles -->
  <div class="section">
    <div class="section-title">🔥 Offres en cours</div>
    <div id="offresList"><div class="empty"><div class="empty-icon">⏳</div>Chargement...</div></div>
  </div>

  <!-- Historique codes utilisés -->
  <div class="section">
    <div class="section-title">📋 Mes codes utilisés</div>
    <div id="histList"><div class="empty"><div class="empty-icon">📭</div>Aucun code utilisé</div></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span>Accueil</a>
  <a href="produits.html" class="nav-item"><span class="ni">💲</span>Produit</a>
  <a href="parrainage.html" class="nav-item"><span class="ni">👥</span>Équipes</a>
  <a href="compte.html" class="nav-item"><span class="ni">👤</span>Mon compte</a>
</nav>

<script>
const SB="https://seegoklunovyuieorkvy.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZWdva2x1bm92eXVpZW9ya3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI3MjYsImV4cCI6MjA5NTI1ODcyNn0.9p2OcUAY25E6XhG4Uq7XYTab_N2FWrg_dtemrUEroeo";
function tok(){return localStorage.getItem("velero_token")||"";}
function uid(){return localStorage.getItem("velero_uid")||"";}
function H(){return{"Content-Type":"application/json","apikey":AK,"Authorization":"Bearer "+tok()};}

function showAlert(msg,type){
  const el=document.getElementById("alertBox");
  el.textContent=msg;el.className="alert "+type+" show";
  setTimeout(()=>el.classList.remove("show"),4000);
}

async function init(){
  if(!tok()){location.href="index.html";return;}
  loadOffres();
  loadHist();
}

async function loadOffres(){
  const el=document.getElementById("offresList");
  try{
    const today=new Date().toISOString().split("T")[0];
    const r=await fetch(SB+"/rest/v1/codes_cadeaux?actif=eq.true&select=*&order=created_at.desc",{headers:H()});
    const codes=await r.json();
    // Filtrer ceux pas expirés et avec utilisations restantes
    const valides=codes.filter(c=>{
      const nonExpire=!c.expire_le||c.expire_le>=today;
      const aDesUtil=c.utilisations_actuelles<c.utilisations_max;
      return nonExpire&&aDesUtil;
    });
    if(!valides.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">🎁</div>Aucune offre en cours</div>';
      return;
    }
    el.innerHTML=valides.map(c=>{
      const restants=c.utilisations_max-c.utilisations_actuelles;
      const expire=c.expire_le?new Date(c.expire_le).toLocaleDateString("fr-FR"):"Illimité";
      return `<div class="offre-card">
        <div class="offre-icon">🎁</div>
        <div class="offre-info">
          <div class="offre-titre">${c.description||"Code cadeau Velero"}</div>
          <div class="offre-desc">Utilisez le code pour recevoir votre bonus</div>
          <div class="offre-montant">+${parseFloat(c.montant).toLocaleString()} FCFA</div>
          <div class="offre-expire">⏰ Expire : ${expire}</div>
        </div>
        <div class="offre-dispo">${restants} restant${restants>1?"s":""}</div>
      </div>`;
    }).join("");
  }catch(e){el.innerHTML='<div class="empty">❌ Erreur chargement</div>';}
}

async function loadHist(){
  const el=document.getElementById("histList");
  try{
    const r=await fetch(SB+"/rest/v1/codes_utilises?user_id=eq."+uid()+"&select=*,codes_cadeaux(code,montant,description)&order=created_at.desc&limit=20",{headers:H()});
    const hist=await r.json();
    if(!hist.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Aucun code utilisé</div>';return;}
    el.innerHTML=hist.map(h=>`
      <div class="hist-item">
        <div class="hi-icon">🎁</div>
        <div class="hi-info">
          <div class="hi-code">${h.codes_cadeaux?.code||"—"}</div>
          <div class="hi-date">${h.codes_cadeaux?.description||""} · ${new Date(h.created_at).toLocaleDateString("fr-FR")}</div>
        </div>
        <div class="hi-gain">+${parseFloat(h.montant_recu||0).toLocaleString()} FCFA</div>
      </div>`).join("");
  }catch(e){}
}

async function appliquerCode(){
  const code=document.getElementById("codeInput").value.trim().toUpperCase();
  if(!code)return showAlert("⚠️ Entrez un code cadeau","err");

  const btn=document.querySelector(".btn-appliquer");
  btn.disabled=true;btn.textContent="⏳...";

  try{
    const today=new Date().toISOString().split("T")[0];

    // Vérifier si le code existe et est valide
    const r=await fetch(SB+"/rest/v1/codes_cadeaux?code=eq."+code+"&actif=eq.true&select=*",{headers:H()});
    const codes=await r.json();

    if(!codes||codes.length===0){
      showAlert("❌ Code invalide ou inexistant","err");
      btn.disabled=false;btn.textContent="🎁 Utiliser";return;
    }

    const c=codes[0];

    // Vérifier expiration
    if(c.expire_le&&c.expire_le<today){
      showAlert("❌ Ce code a expiré le "+new Date(c.expire_le).toLocaleDateString("fr-FR"),"err");
      btn.disabled=false;btn.textContent="🎁 Utiliser";return;
    }

    // Vérifier utilisations max
    if(c.utilisations_actuelles>=c.utilisations_max){
      showAlert("❌ Ce code a atteint son nombre maximum d'utilisations","err");
      btn.disabled=false;btn.textContent="🎁 Utiliser";return;
    }

    // Vérifier si déjà utilisé par cet utilisateur
    const r2=await fetch(SB+"/rest/v1/codes_utilises?user_id=eq."+uid()+"&code_id=eq."+c.id+"&select=id",{headers:H()});
    const deja=await r2.json();
    if(deja&&deja.length>0){
      showAlert("❌ Vous avez déjà utilisé ce code","err");
      btn.disabled=false;btn.textContent="🎁 Utiliser";return;
    }

    // Appliquer le code
    // 1. Enregistrer utilisation
    await fetch(SB+"/rest/v1/codes_utilises",{
      method:"POST",
      headers:{...H(),"Prefer":"return=representation"},
      body:JSON.stringify({user_id:uid(),code_id:c.id,montant_recu:c.montant})
    });

    // 2. Incrémenter utilisations
    await fetch(SB+"/rest/v1/codes_cadeaux?id=eq."+c.id,{
      method:"PATCH",headers:H(),
      body:JSON.stringify({utilisations_actuelles:c.utilisations_actuelles+1})
    });

    // 3. Créditer le solde
    const rp=await fetch(SB+"/rest/v1/profiles?id=eq."+uid()+"&select=solde",{headers:H()});
    const prof=await rp.json();
    const ancienSolde=parseFloat(prof[0]?.solde||0);
    await fetch(SB+"/rest/v1/profiles?id=eq."+uid(),{
      method:"PATCH",headers:H(),
      body:JSON.stringify({solde:ancienSolde+parseFloat(c.montant)})
    });

    // 4. Enregistrer transaction
    await fetch(SB+"/rest/v1/transactions",{
      method:"POST",
      headers:{...H(),"Prefer":"return=representation"},
      body:JSON.stringify({
        user_id:uid(),type:"bonus",montant:c.montant,montant_net:c.montant,
        statut:"valide",note:"Code cadeau utilisé: "+code
      })
    });

    // Afficher succès
    document.getElementById("scMontant").textContent="+"+parseFloat(c.montant).toLocaleString()+" FCFA";
    document.getElementById("successCard").style.display="block";
    document.getElementById("codeInput").value="";
    btn.disabled=false;btn.textContent="🎁 Utiliser";
    loadOffres();
    loadHist();

  }catch(e){
    showAlert("❌ Erreur: "+e.message,"err");
    btn.disabled=false;btn.textContent="🎁 Utiliser";
  }
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js");}</script>
</body>
</html>
