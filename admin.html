<script>
const SB="https://seegoklunovyuieorkvy.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZWdva2x1bm92eXVpZW9ya3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI3MjYsImV4cCI6MjA5NTI1ODcyNn0.9p2OcUAY25E6XhG4Uq7XYTab_N2FWrg_dtemrUEroeo";
const ADMIN_EMAIL="abdoula12cherif@gmail.com";
const PAGE_SIZE=20;

let AT=localStorage.getItem("admin_tok")||"";
let adminRole="admin";
let currentPage=1;
let codeTimer=null;

function H(){return{"Content-Type":"application/json","apikey":AK,"Authorization":"Bearer "+AT};}
function toast(msg,type="ok"){const el=document.getElementById("toast");el.textContent=msg;el.className="toast "+type+" show";setTimeout(()=>el.classList.remove("show"),3500);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("collapsed");document.getElementById("mainContent").classList.toggle("full");}

async function G(url){const r=await fetch(SB+"/rest/v1/"+url,{headers:H()});if(!r.ok)return[];return r.json();}
async function P(url,data){return fetch(SB+"/rest/v1/"+url,{method:"POST",headers:{...H(),"Prefer":"return=representation"},body:JSON.stringify(data)}).then(r=>r.json());}
async function PATCH(url,data){return fetch(SB+"/rest/v1/"+url,{method:"PATCH",headers:H(),body:JSON.stringify(data)});}
async function DEL(url){return fetch(SB+"/rest/v1/"+url,{method:"DELETE",headers:H()});}

// ── AUTH
async function doLogin(){
  const email=document.getElementById("adminEmail").value.trim();
  const pass=document.getElementById("adminPass").value;
  const errEl=document.getElementById("loginErr");
  if(!email||!pass){errEl.textContent="Remplissez tous les champs";errEl.className="login-err show";return;}
  const r=await fetch(SB+"/auth/v1/token?grant_type=password",{
    method:"POST",headers:{"Content-Type":"application/json","apikey":AK},
    body:JSON.stringify({email,password:pass})
  });
  const d=await r.json();
  if(!d.access_token){errEl.textContent=d.error_description||"Identifiants incorrects";errEl.className="login-err show";return;}
  // Vérifier le rôle
  const rp=await fetch(SB+"/rest/v1/profiles?id=eq."+d.user.id+"&select=role,email",{headers:{"Content-Type":"application/json","apikey":AK,"Authorization":"Bearer "+d.access_token}});
  const dp=await rp.json();
  const role=dp[0]?.role||"user";
  if(role!=="admin"&&role!=="manager"&&email!==ADMIN_EMAIL){
    errEl.textContent="Accès refusé — rôle insuffisant";errEl.className="login-err show";return;
  }
  AT=d.access_token;adminRole=email===ADMIN_EMAIL?"admin":role;
  localStorage.setItem("admin_tok",AT);
  localStorage.setItem("admin_role",adminRole);
  document.getElementById("loginPage").style.display="none";

function txHTML(tx,type){
  const p=tx.profiles||{};
  const date=new Date(tx.created_at).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
  const actions=tx.statut==="en_attente"?`
    <div class="tx-actions">
      <button class="btn-v" onclick="validerTx('${tx.id}','${tx.user_id}',${tx.montant},'${type}')">✅ Valider</button>
      <button class="btn-r" onclick="rejeterTx('${tx.id}','${tx.user_id}',${tx.montant},'${type}')">❌ Rejeter</button>
    </div>`:"";
  return `<div class="tx-item" id="tx-${tx.id}">
    <div class="tx-top">
      <div>
        <div class="tx-user">👤 ${p.full_name||p.email||"—"}</div>
        <div class="tx-details">📱 ${tx.reseau||"—"} · ${tx.numero_mobile||"—"}<br>📅 ${date}<br>📝 ${tx.note||"—"}</div>
        ${tx.reference?`<div class="tx-ref">🔑 ${tx.reference}</div>`:""}
      </div>
      <div style="text-align:right;">
        <div class="tx-amount ${type==="depot"?"plus":"minus"}">${parseFloat(tx.montant).toLocaleString()} F</div>
        <span class="statut-b ${tx.statut==="en_attente"?"s-attente":tx.statut==="valide"?"s-valide":"s-rejete"}">${tx.statut==="en_attente"?"⏳ Attente":tx.statut==="valide"?"✅ Validé":"❌ Rejeté"}</span>
      </div>
    </div>
    ${actions}
  </div>`;
}

async function validerTx(id,userId,montant,type){
  if(!confirm("Valider "+parseInt(montant).toLocaleString()+" F ?"))return;
  await PATCH("transactions?id=eq."+id,{statut:"valide"});
  if(type==="depot"){
    const p=await G("profiles?id=eq."+userId+"&select=solde");
    await PATCH("profiles?id=eq."+userId,{solde:parseFloat(p[0]?.solde||0)+parseFloat(montant)});
  }
  toast("✅ Validé ! Solde crédité.");
  document.getElementById("tx-"+id)?.remove();
  loadBadges();
}

async function rejeterTx(id,userId,montant,type){
  if(!confirm("Rejeter cette transaction ?"))return;
  await PATCH("transactions?id=eq."+id,{statut:"rejete"});
  if(type==="retrait"){
    const p=await G("profiles?id=eq."+userId+"&select=solde");
    await PATCH("profiles?id=eq."+userId,{solde:parseFloat(p[0]?.solde||0)+parseFloat(montant)});
  }
  toast("❌ Rejeté.","err");
  document.getElementById("tx-"+id)?.remove();
  loadBadges();
}

function closeUD(){document.getElementById("udModal").classList.remove("show");}

async function crediterUser(id,nom){
  const m=prompt("Montant à CRÉDITER pour "+nom+" (FCFA) :");
  if(!m||isNaN(m)||parseInt(m)<=0)return;
  const raison=prompt("Raison :")||"Crédit admin";
  const p=await G("profiles?id=eq."+id+"&select=solde");
  await PATCH("profiles?id=eq."+id,{solde:parseFloat(p[0]?.solde||0)+parseInt(m)});
  await P("transactions",{user_id:id,type:"bonus",montant:parseInt(m),montant_net:parseInt(m),statut:"valide",note:"Crédit admin: "+raison});
  toast("✅ "+parseInt(m).toLocaleString()+" F crédités à "+nom);
  closeUD();renderUsers();
}

async function debiterUser(id,nom){
  const m=prompt("Montant à DÉBITER pour "+nom+" (FCFA) :");
  if(!m||isNaN(m)||parseInt(m)<=0)return;
  const p=await G("profiles?id=eq."+id+"&select=solde");
  const nouveau=Math.max(0,parseFloat(p[0]?.solde||0)-parseInt(m));
  await PATCH("profiles?id=eq."+id,{solde:nouveau});
  toast("💸 "+parseInt(m).toLocaleString()+" F débités de "+nom);
  closeUD();renderUsers();
}

async function changerMDP(id){
  const mdp=prompt("Nouveau mot de passe pour cet utilisateur :");
  if(!mdp||mdp.length<6){alert("Minimum 6 caractères");return;}
  const r=await fetch(SB+"/auth/v1/admin/users/"+id,{
    method:"PUT",headers:{...H(),"Authorization":"Bearer "+AT},
    body:JSON.stringify({password:mdp})
  });
  if(r.ok){toast("✅ Mot de passe modifié !");}
  else{toast("❌ Erreur — utilisez le dashboard Supabase","err");}
}

async function attribuerPlan(id){
  const plan=prompt("Nom du plan à attribuer (VIP 1, VIP 2, Pack 10J...) :");
  if(!plan)return;
  const plans=await G("plans?nom=eq."+encodeURIComponent(plan)+"&select=*");
  if(!plans.length){toast("❌ Plan introuvable","err");return;}
  const p=plans[0];
  await P("investissements",{user_id:id,plan_id:p.id,plan_nom:p.nom,montant_investi:0,revenu_jour:p.revenu_jour,jours_total:p.duree_jours,jours_restants:p.duree_jours,statut:"actif",type_gain:p.type_gain||"journalier"});
  await P("transactions",{user_id:id,type:"bonus",montant:0,montant_net:0,statut:"valide",note:"Plan "+p.nom+" attribué par admin"});
  toast("✅ Plan "+p.nom+" attribué !");closeUD();
}

async function toggleRetrait(id,bloque){
  await PATCH("profiles?id=eq."+id,{retrait_bloque:!bloque});
  toast(bloque?"✅ Retraits débloqués":"🔴 Retraits bloqués");closeUD();renderUsers();
}

async function toggleBan(id,bloque){
  if(!bloque&&!confirm("Bannir ce compte ? L'utilisateur ne pourra plus se connecter."))return;
  await PATCH("profiles?id=eq."+id,{bloque:!bloque});
  // Révoquer les sessions si on bannit
  if(!bloque){await fetch(SB+"/auth/v1/admin/users/"+id,{method:"PUT",headers:H(),body:JSON.stringify({ban_duration:"87600h"})}).catch(()=>{});}
  toast(bloque?"✅ Compte débanni":"🚫 Compte banni");closeUD();renderUsers();
}

async function terminerInvest(id){

  toast("✅ Investissement terminé");renderInvestissements();
}

async function attribuerRole(){

function checkAutoCode(){
  const now=new Date();
  if(now.getHours()===15&&now.getMinutes()===0){genererCodeAuto();}
}

async function genererCodeAuto(){
  const code="VE"+Math.random().toString(36).substring(2,8).toUpperCase();
  const expireAt=new Date(Date.now()+3*60*1000).toISOString(); // 3 minutes

  // Désactiver l'ancien code auto
  await PATCH("codes_cadeaux?auto_genere=eq.true",{actif:false});

  // Créer nouveau
  await P("codes_cadeaux",{
    code,description:"Code automatique 15h",
    montant:100,utilisations_max:1000,
    utilisations_actuelles:0,actif:true,
    auto_genere:true,expire_at:expireAt,expire_le:null
  });

  // Afficher avec compte à rebours
  const el=document.getElementById("autoCodeDisplay");
  if(!el)return;
  el.innerHTML=`<div class="code-display">${code}</div><div class="code-timer" id="codeCountdown">3:00</div>`;

  let seconds=180;
  if(autoCodeInterval)clearInterval(autoCodeInterval);
  autoCodeInterval=setInterval(async()=>{
    seconds--;
    const el2=document.getElementById("codeCountdown");
    if(el2)el2.textContent=Math.floor(seconds/60)+":"+(seconds%60).toString().padStart(2,"0");
    if(seconds<=0){
      clearInterval(autoCodeInterval);
      await PATCH("codes_cadeaux?code=eq."+code,{actif:false});
      const el3=document.getElementById("autoCodeDisplay");
      if(el3)el3.innerHTML=`<div class="code-expired">Code expiré — Prochain code à 15h00</div>`;
    }
  },1000);

  toast("🎁 Code auto généré : "+code+" (valide 3 min)");
}

function genCode(){
  const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code="VE";for(let i=0;i<6;i++)code+=c[Math.floor(Math.random()*c.length)];
  document.getElementById("newCode").value=code;
}

async function creerCode(){
  const code=document.getElementById("newCode").value.trim().toUpperCase();
  const desc=document.getElementById("newDesc").value.trim();
  const montant=parseInt(document.getElementById("newMontant").value);
  const util=parseInt(document.getElementById("newUtil").value);
  const expire=document.getElementById("newExpire").value||null;
  const al=document.getElementById("codeFormAlert");
  if(!code||!montant||!util){al.textContent="⚠️ Code, montant et utilisations requis";al.className="alert a-err show";return;}
  const r=await P("codes_cadeaux",{code,description:desc||"Code cadeau",montant,utilisations_max:util,utilisations_actuelles:0,expire_le:expire,actif:true,auto_genere:false});
  if(Array.isArray(r)&&r.length>0){al.textContent="✅ Code créé : "+code;al.className="alert a-ok show";renderCodes();}
  else{al.textContent="❌ "+(r?.message||"Erreur");al.className="alert a-err show";}
}

async function toggleCode(id,actif){
  await PATCH("codes_cadeaux?id=eq."+id,{actif:!actif});
  toast(actif?"Code désactivé":"Code activé");renderCodes();
}

// ── PAGINATION
function pagHTML(pages,current,fn){
  if(pages<=1)return"";
  let html=`<div class="pagination">`;
  html+=`<button class="pg-btn" onclick="${fn(Math.max(1,current-1))}" ${current===1?"disabled":""}>‹ Préc</button>`;
  let start=Math.max(1,current-2),end=Math.min(pages,current+2);
  if(start>1)html+=`<button class="pg-btn" onclick="${fn(1)}">1</button>${start>2?'<span style="color:var(--muted);padding:0 4px;">…</span>':""}`;
  for(let i=start;i<=end;i++)html+=`<button class="pg-btn ${i===current?"active":""}" onclick="${fn(i)}">${i}</button>`;
  if(end<pages)html+=`${end<pages-1?'<span style="color:var(--muted);padding:0 4px;">…</span>':""}<button class="pg-btn" onclick="${fn(pages)}">${pages}</button>`;
  html+=`<button class="pg-btn" onclick="${fn(Math.min(pages,current+1))}" ${current===pages?"disabled":""}>Suiv ›</button>`;
  html+=`<span class="pg-info">${current}/${pages}</span></div>`;
  return html;
}
