<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f7f9;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.hero{width:100%;height:200px;position:relative;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 55%;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,50,70,.55),rgba(0,20,40,.80));}
.hero-brand{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.logo{display:flex;align-items:center;}
.logo-v{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#e53935;}
.logo-name{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:#fff;}
.tagline{color:rgba(255,255,255,.85);font-size:12px;}
.wave{position:absolute;bottom:-1px;width:100%;height:40px;}
.card-wrap{width:100%;max-width:440px;padding:0 12px 30px;margin-top:-16px;}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,100,130,.13);overflow:hidden;}
.tabs{display:flex;border-bottom:2px solid #e8f4f7;}
.tab{flex:1;padding:13px 0;font-size:14px;font-weight:700;background:none;border:none;cursor:pointer;color:#90a4ae;}
.tab.active{color:#00bcd4;border-bottom:3px solid #00bcd4;margin-bottom:-2px;}
.fb{padding:20px;}
.title{font-size:20px;font-weight:700;margin-bottom:3px;}
.sub{font-size:12px;color:#607d8b;margin-bottom:16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:#334155;margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 13px;font-size:14px;font-family:inherit;border:1.5px solid #cfe8ed;border-radius:10px;outline:none;background:#f5fafb;color:#0f2a3a;}
.field input:focus{border-color:#00bcd4;box-shadow:0 0 0 3px rgba(0,188,212,.15);}
.phone-row{display:flex;gap:6px;}
.phone-row select{width:145px;flex-shrink:0;}
.phone-row input{flex:1;}
.ref-badge{display:inline-block;background:#e0f7fa;color:#0097a7;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:5px;}
.alert{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:11px;display:none;}
.alert.show{display:block;}
.err{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;}
.suc{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:11px;cursor:pointer;margin-bottom:14px;font-family:inherit;}
.btn:disabled{opacity:.6;}
.sw-text{text-align:center;font-size:12px;color:#607d8b;}
.sw{color:#00bcd4;font-weight:700;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;}
.hidden{display:none;}
.redir{position:fixed;inset:0;background:linear-gradient(135deg,#00bcd4,#0097a7);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.redir.show{display:flex;}
.redir-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#fff;}
.redir-spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top:3px solid #fff;border-radius:50%;animation:sp .7s linear infinite;}
.redir-txt{color:rgba(255,255,255,.9);font-size:14px;font-weight:600;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="redir" id="redir">
  <div class="redir-logo">Velero Energy</div>
  <div class="redir-spin"></div>
  <div class="redir-txt" id="redirTxt">Connexion en cours...</div>
</div>

<div class="hero">
  <img src="https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg" alt="Velero"/>
  <div class="hero-overlay"></div>
  <div class="hero-brand">
    <div class="logo"><span class="logo-v">V</span><span class="logo-name">elero Energy</span></div>
    <p class="tagline">La plateforme d'investissement énergétique</p>
  </div>
  <svg class="wave" viewBox="0 0 1440 40" preserveAspectRatio="none">
    <path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z" fill="#f0f7f9"/>
  </svg>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="t1" onclick="showTab('login')">Connexion</button>
      <button class="tab" id="t2" onclick="showTab('reg')">Inscription</button>
    </div>

    <div id="loginForm" class="fb">
      <div class="title">Bon retour 👋</div>
      <div class="sub">Connectez-vous à votre espace investisseur</div>
      <div id="lErr" class="alert err"></div>
      <div class="field"><label>Email</label>
        <input type="email" id="lEmail" placeholder="vous@exemple.com"/>
      </div>
      <div class="field"><label>Mot de passe</label>
        <input type="password" id="lPass" placeholder="••••••••"/>
      </div>
      <button class="btn" id="btnL" onclick="doLogin()">Se connecter</button>
      <p class="sw-text">Pas de compte ? <button class="sw" onclick="showTab('reg')">S'inscrire</button></p>
    </div>

    <div id="regForm" class="fb hidden">
      <div class="title">Créer un compte 🚀</div>
      <div class="sub">Rejoignez la plateforme Velero Energy</div>
      <div id="rErr" class="alert err"></div>
      <div class="field"><label>Nom complet</label>
        <input type="text" id="rName" placeholder="Jean Dupont"/>
      </div>
      <div class="field"><label>Email</label>
        <input type="email" id="rEmail" placeholder="vous@exemple.com"/>
      </div>
      <div class="field">
        <label>Téléphone</label>
        <div class="phone-row">
          <select id="rCC">
            <option value="+229">🇧🇯 +229</option>
            <option value="+226">🇧🇫 +226</option>
            <option value="+237" selected>🇨🇲 +237</option>
            <option value="+225">🇨🇮 +225</option>
            <option value="+241">🇬🇦 +241</option>
            <option value="+223">🇲🇱 +223</option>
            <option value="+227">🇳🇪 +227</option>
            <option value="+234">🇳🇬 +234</option>
            <option value="+243">🇨🇩 +243</option>
            <option value="+221">🇸🇳 +221</option>
            <option value="+228">🇹🇬 +228</option>
          </select>
          <input type="tel" id="rPhone" placeholder="6XX XXX XXX"/>
        </div>
      </div>
      <div class="field"><label>Mot de passe</label>
        <input type="password" id="rPass" placeholder="••••••••"/>
      </div>
      <div class="field"><label>Confirmer</label>
        <input type="password" id="rConf" placeholder="••••••••"/>
      </div>
      <div class="field">
        <label>Code parrainage <span id="refBadge" class="ref-badge hidden">✓ Détecté</span></label>
        <input type="text" id="rRef" placeholder="Optionnel" style="text-transform:uppercase;"/>
      </div>
      <button class="btn" id="btnR" onclick="doRegister()">Créer mon compte</button>
      <p class="sw-text">Déjà un compte ? <button class="sw" onclick="showTab('login')">Se connecter</button></p>
    </div>
  </div>
</div>

<script>
const SB="https://seegoklunovyuieorkvy.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZWdva2x1bm92eXVpZW9ya3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI3MjYsImV4cCI6MjA5NTI1ODcyNn0.9p2OcUAY25E6XhG4Uq7XYTab_N2FWrg_dtemrUEroeo";

// Ref URL
const urlRef=new URLSearchParams(location.search).get("ref");
if(urlRef){
  document.getElementById("rRef").value=urlRef.toUpperCase();
  document.getElementById("refBadge").classList.remove("hidden");
  showTab("reg");
}

function showTab(t){
  document.getElementById("t1").classList.toggle("active",t==="login");
  document.getElementById("t2").classList.toggle("active",t==="reg");
  document.getElementById("loginForm").classList.toggle("hidden",t!=="login");
  document.getElementById("regForm").classList.toggle("hidden",t!=="reg");
}

function setErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className="alert err show";}

function saveAndGo(d,txt="Connexion réussie..."){
  localStorage.setItem("velero_token",d.access_token);
  localStorage.setItem("velero_refresh",d.refresh_token||"");
  localStorage.setItem("velero_uid",d.user.id);
  localStorage.setItem("velero_email",d.user.email);
  document.getElementById("redirTxt").textContent=txt;
  document.getElementById("redir").classList.add("show");
  setTimeout(()=>window.location.href="dashboard.html",1000);
}

async function doLogin(){
  const email=document.getElementById("lEmail").value.trim();
  const pass=document.getElementById("lPass").value;
  if(!email||!pass)return setErr("lErr","Email et mot de passe requis.");
  const btn=document.getElementById("btnL");
  btn.disabled=true;btn.textContent="⏳ Connexion...";
  try{
    const r=await fetch(SB+"/auth/v1/token?grant_type=password",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":AK},
      body:JSON.stringify({email,password:pass})
    });
    const d=await r.json();
    if(!d.access_token){
      setErr("lErr",d.error_description||d.msg||"Email ou mot de passe incorrect.");
      btn.disabled=false;btn.textContent="Se connecter";return;
    }
    saveAndGo(d,"Connexion réussie !");
  }catch(e){
    setErr("lErr","Erreur réseau: "+e.message);
    btn.disabled=false;btn.textContent="Se connecter";
  }
}

async function doRegister(){
  const name=document.getElementById("rName").value.trim();
  const email=document.getElementById("rEmail").value.trim();
  const pass=document.getElementById("rPass").value;
  const conf=document.getElementById("rConf").value;
  const ref=document.getElementById("rRef").value.trim().toUpperCase();
  const cc=document.getElementById("rCC").value;
  const phone=cc+document.getElementById("rPhone").value.trim();
  if(!name||!email||!pass)return setErr("rErr","Tous les champs sont requis.");
  if(pass!==conf)return setErr("rErr","Les mots de passe ne correspondent pas.");
  if(pass.length<6)return setErr("rErr","Minimum 6 caractères.");
  const btn=document.getElementById("btnR");
  btn.disabled=true;btn.textContent="⏳ Création...";
  try{
    const r=await fetch(SB+"/auth/v1/signup",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":AK},
      body:JSON.stringify({
        email,password:pass,
        data:{full_name:name,phone,country_code:cc,referral_code:ref}
      })
    });
    const d=await r.json();
    if(d.error){
      setErr("rErr",d.error_description||d.error);
      btn.disabled=false;btn.textContent="Créer mon compte";return;
    }
    // Connexion automatique après inscription
    if(d.access_token&&d.user){
      await new Promise(res=>setTimeout(res,1500)); // Attendre trigger Supabase
      saveAndGo(d,"Compte créé ! Bienvenue 🎉");
    }else{
      // Si Supabase demande encore confirmation → forcer connexion
      const r2=await fetch(SB+"/auth/v1/token?grant_type=password",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":AK},
        body:JSON.stringify({email,password:pass})
      });
      const d2=await r2.json();
      if(d2.access_token){
        await new Promise(res=>setTimeout(res,1500));
        saveAndGo(d2,"Compte créé ! Bienvenue 🎉");
      }else{
        setErr("rErr","Compte créé ! Connectez-vous maintenant.");
        showTab("login");
        document.getElementById("lEmail").value=email;
        btn.disabled=false;btn.textContent="Créer mon compte";
      }
    }
  }catch(e){
    setErr("rErr","Erreur réseau: "+e.message);
    btn.disabled=false;btn.textContent="Créer mon compte";
  }
}
</script>
</body>
</html>
