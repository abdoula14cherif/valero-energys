<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Velero Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f7f9;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.hero{width:100%;height:200px;position:relative;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 55%;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,50,70,.55),rgba(0,20,40,.80));}
.hero-brand{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.logo{display:flex;align-items:center;}
.logo-v{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#e53935;text-shadow:0 2px 16px rgba(0,0,0,.45);}
.logo-name{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.45);}
.hero-tagline{color:rgba(255,255,255,.85);font-size:12px;}
.hero-wave{position:absolute;bottom:-1px;width:100%;height:40px;}
.card-wrap{width:100%;max-width:440px;padding:0 12px 30px;margin-top:-16px;}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,100,130,.13);overflow:hidden;}
.tabs{display:flex;border-bottom:2px solid #e8f4f7;}
.tab{flex:1;padding:13px 0;font-size:14px;font-weight:700;background:none;border:none;cursor:pointer;color:#90a4ae;}
.tab.active{color:#00bcd4;border-bottom:3px solid #00bcd4;margin-bottom:-2px;}
.form-body{padding:20px;}
.form-title{font-size:20px;font-weight:700;margin-bottom:3px;}
.form-sub{font-size:12px;color:#607d8b;margin-bottom:16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:#334155;margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 13px;font-size:14px;font-family:inherit;border:1.5px solid #cfe8ed;border-radius:10px;outline:none;background:#f5fafb;color:#0f2a3a;}
.field input:focus{border-color:#00bcd4;box-shadow:0 0 0 3px rgba(0,188,212,.15);}
.phone-row{display:flex;gap:6px;}
.phone-row select{width:145px;flex-shrink:0;}
.phone-row input{flex:1;}
.ref-badge{display:inline-block;background:#e0f7fa;color:#0097a7;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:5px;}
.forgot{font-size:12px;color:#00bcd4;text-decoration:none;font-weight:500;display:block;text-align:right;margin-bottom:12px;}
.alert{padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:11px;display:none;}
.alert.show{display:block;}
.err{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;}
.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:11px;cursor:pointer;margin-bottom:14px;font-family:inherit;}
.btn-main:disabled{opacity:.6;}
.switch-text{text-align:center;font-size:12px;color:#607d8b;}
.sw{color:#00bcd4;font-weight:700;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;}
footer{margin-top:16px;font-size:11px;color:#90a4ae;text-align:center;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="hero">
  <img src="https://i.ibb.co/d4y9ggqh/IMG-20260525-WA0001-1.jpg" alt="Velero"/>
  <div class="hero-overlay"></div>
  <div class="hero-brand">
    <div class="logo"><span class="logo-v">V</span><span class="logo-name">elero Energy</span></div>
    <p class="hero-tagline">La plateforme d'investissement énergétique</p>
  </div>
  <svg class="hero-wave" viewBox="0 0 1440 40" preserveAspectRatio="none">
    <path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z" fill="#f0f7f9"/>
  </svg>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="t1" onclick="sw('login')">Connexion</button>
      <button class="tab" id="t2" onclick="sw('register')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form-body">
      <h1 class="form-title">Bon retour 👋</h1>
      <p class="form-sub">Connectez-vous à votre espace investisseur</p>
      <div id="lErr" class="alert err"></div>
      <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="vous@exemple.com" autocomplete="email"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password"/></div>
      <a href="#" class="forgot">Mot de passe oublié ?</a>
      <button class="btn-main" id="btnL" onclick="login()">Se connecter</button>
      <p class="switch-text">Pas de compte ? <button class="sw" onclick="sw('register')">S'inscrire</button></p>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form-body hidden">
      <h1 class="form-title">Créer un compte 🚀</h1>
      <p class="form-sub">Rejoignez la plateforme Velero Energy</p>
      <div id="rErr" class="alert err"></div>
      <div id="rOk" class="alert ok"></div>
      <div class="field"><label>Nom complet</label><input type="text" id="rName" placeholder="Jean Dupont"/></div>
      <div class="field"><label>Email</label><input type="email" id="rEmail" placeholder="vous@exemple.com" autocomplete="email"/></div>
      <div class="field">
        <label>Téléphone</label>
        <div class="phone-row">
          <select id="rCC">
            <option value="+229">🇧🇯 +229</option>
            <option value="+226">🇧🇫 +226</option>
            <option value="+237" selected>🇨🇲 +237</option>
            <option value="+225">🇨🇮 +225</option>
            <option value="+241">🇬🇦 +241</option>
            <option value="+223">🇲🇱 +223</option>
            <option value="+227">🇳🇪 +227</option>
            <option value="+234">🇳🇬 +234</option>
            <option value="+243">🇨🇩 +243</option>
            <option value="+221">🇸🇳 +221</option>
            <option value="+228">🇹🇬 +228</option>
          </select>
          <input type="tel" id="rPhone" placeholder="6XX XXX XXX"/>
        </div>
      </div>
      <div class="field"><label>Mot de passe</label><input type="password" id="rPass" placeholder="••••••••" autocomplete="new-password"/></div>
      <div class="field"><label>Confirmer</label><input type="password" id="rConf" placeholder="••••••••"/></div>
      <div class="field">
        <label>Code parrainage <span id="refBadge" class="ref-badge hidden">✓ Détecté</span></label>
        <input type="text" id="rRef" placeholder="Optionnel"/>
      </div>
      <button class="btn-main" id="btnR" onclick="register()">Créer mon compte</button>
      <p class="switch-text">Déjà un compte ? <button class="sw" onclick="sw('login')">Se connecter</button></p>
    </div>
  </div>
  <footer>© 2025 Velero Energy</footer>
</div>

<script>
const SB="https://seegoklunovyuieorkvy.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZWdva2x1bm92eXVpZW9ya3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI3MjYsImV4cCI6MjA5NTI1ODcyNn0.9p2OcUAY25E6XhG4Uq7XYTab_N2FWrg_dtemrUEroeo";

// Ref depuis URL
(function(){
  const r=new URLSearchParams(location.search).get("ref");
  if(r){document.getElementById("rRef").value=r;document.getElementById("refBadge").classList.remove("hidden");sw("register");}
})();

function sw(t){
  document.getElementById("t1").classList.toggle("active",t==="login");
  document.getElementById("t2").classList.toggle("active",t==="register");
  document.getElementById("loginForm").classList.toggle("hidden",t!=="login");
  document.getElementById("registerForm").classList.toggle("hidden",t!=="register");
}

function err(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className="alert err show";}
function ok(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className="alert ok show";}

// Sauvegarder la session de façon robuste
function saveSession(d){
  try{
    sessionStorage.setItem("ve_tok",d.access_token);
    sessionStorage.setItem("ve_ref",d.refresh_token||"");
    sessionStorage.setItem("ve_uid",d.user.id);
    sessionStorage.setItem("ve_email",d.user.email);
    localStorage.setItem("velero_token",d.access_token);
    localStorage.setItem("velero_refresh",d.refresh_token||"");
    localStorage.setItem("velero_uid",d.user.id);
    localStorage.setItem("velero_email",d.user.email);
    document.cookie="ve_uid="+d.user.id+";path=/;max-age=86400";
    document.cookie="ve_tok="+d.access_token.substring(0,50)+";path=/;max-age=3600";
    return true;
  }catch(e){return false;}
}

async function login(){
  const email=document.getElementById("lEmail").value.trim();
  const pass=document.getElementById("lPass").value;
  if(!email||!pass)return err("lErr","Email et mot de passe requis.");
  const btn=document.getElementById("btnL");
  btn.disabled=true;btn.textContent="⏳ Connexion...";
  try{
    const r=await fetch(SB+"/auth/v1/token?grant_type=password",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":AK},
      body:JSON.stringify({email,password:pass})
    });
    const d=await r.json();
    if(!d.access_token){
      err("lErr",d.error_description||d.msg||"Identifiants incorrects");
      btn.disabled=false;btn.textContent="Se connecter";
      return;
    }
    saveSession(d);
    // Vérifier que c'est bien sauvegardé
    const check=localStorage.getItem("velero_token");
    if(!check){
      err("lErr","Erreur de stockage. Essayez un autre navigateur.");
      btn.disabled=false;btn.textContent="Se connecter";
      return;
    }
    window.location.replace("dashboard.html");
  }catch(e){
    err("lErr","Erreur réseau: "+e.message);
    btn.disabled=false;btn.textContent="Se connecter";
  }
}

async function register(){
  const name=document.getElementById("rName").value.trim();
  const email=document.getElementById("rEmail").value.trim();
  const pass=document.getElementById("rPass").value;
  const conf=document.getElementById("rConf").value;
  const ref=document.getElementById("rRef").value.trim();
  const cc=document.getElementById("rCC").value;
  const phone=cc+document.getElementById("rPhone").value.trim();
  if(!name||!email||!pass)return err("rErr","Tous les champs sont requis.");
  if(pass!==conf)return err("rErr","Mots de passe différents.");
  if(pass.length<6)return err("rErr","Minimum 6 caractères.");
  const btn=document.getElementById("btnR");
  btn.disabled=true;btn.textContent="⏳ Création...";
  try{
    const r=await fetch(SB+"/auth/v1/signup",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":AK},
      body:JSON.stringify({
        email,password:pass,
        data:{full_name:name,phone,country_code:cc,referral_code:ref}
      })
    });
    const d=await r.json();
    if(d.error){
      err("rErr",d.error_description||d.error);
      btn.disabled=false;btn.textContent="Créer mon compte";
      return;
    }
    if(d.access_token&&d.user){
      saveSession(d);
      await new Promise(r=>setTimeout(r,2000));
      window.location.replace("dashboard.html");
    }else{
      ok("rOk","✅ Compte créé ! Vérifiez votre email puis connectez-vous.");
      btn.disabled=false;btn.textContent="Créer mon compte";
    }
  }catch(e){
    err("rErr","Erreur réseau: "+e.message);
    btn.disabled=false;btn.textContent="Créer mon compte";
  }
}
</script>
</body>
</html>
